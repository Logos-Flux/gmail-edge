version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    labels:
      - dependencies
      - github-actions

  # npm ecosystem intentionally omitted: this repo uses bun.lock, which
  # Dependabot does not yet update (it only handles package-lock.json,
  # yarn.lock, and pnpm-lock.yaml). PRs that bump package.json without
  # updating bun.lock fail CI's `bun install --frozen-lockfile` step.
  # Security alerts (vulnerability-alerts API) still cover npm packages
  # independently. Run `bun update` manually when version bumps are wanted.
